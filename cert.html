<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GRAID Zertifikat</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; color: #111; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 42px 20px; }
    .card { background: white; border-radius: 18px; padding: 28px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .top { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; }
    .grade { font-size: 84px; font-weight: 800; line-height: 1; }
    .muted { color: #666; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 24px; }
    .field { background: #f2f2f2; border-radius: 12px; padding: 14px; }
    .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: .04em; }
    .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
    .status { display: inline-block; padding: 8px 12px; border-radius: 999px; background: #e9e9e9; font-weight: 700; }
    .images { display: flex; gap: 16px; margin-top: 24px; flex-wrap: wrap; }
    .images img { max-width: 260px; border-radius: 12px; border: 1px solid #ddd; }
    @media (max-width: 720px) {
      .top { flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .grade { font-size: 64px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="card" id="app">
      <p>Lade Zertifikat...</p>
    </div>
  </main>

  <script>
    function getId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function esc(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function main() {
      const id = getId();
      const app = document.getElementById("app");

      if (!id) {
        app.innerHTML = "<h1>Keine Zertifikats-ID angegeben.</h1>";
        return;
      }

      try {
        const response = await fetch("data/cards.json?cacheBust=" + Date.now());
        const cards = await response.json();
        const card = cards[id];

        if (!card) {
          app.innerHTML = `
            <h1>Zertifikat nicht gefunden</h1>
            <p class="muted">ID: ${esc(id)}</p>
          `;
          return;
        }

        const front = card.front_image ? `<img src="${esc(card.front_image)}" alt="Vorderseite">` : "";
        const back = card.back_image ? `<img src="${esc(card.back_image)}" alt="Rueckseite">` : "";
        const images = front || back ? `<div class="images">${front}${back}</div>` : "";

        app.innerHTML = `
          <div class="top">
            <div>
              <h1>${esc(card.card_name)}</h1>
              <p class="muted">${esc(card.set_name)} · ${esc(card.set_number)} · ${esc(card.language)} · ${esc(card.year)}</p>
              <span class="status">${esc(card.status || "active")}</span>
            </div>
            <div>
              <div class="label">Grade</div>
              <div class="grade">${esc(card.grade_total)}</div>
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <div class="label">Zertifikats-ID</div>
              <div class="value">${esc(card.id)}</div>
            </div>
            <div class="field">
              <div class="label">Grading-Datum</div>
              <div class="value">${esc(card.graded_at)}</div>
            </div>
            <div class="field">
              <div class="label">Centering 12%</div>
              <div class="value">${esc(card.grade_centering)}</div>
            </div>
            <div class="field">
              <div class="label">Zustand 80%</div>
              <div class="value">${esc(card.grade_condition)}</div>
            </div>
            <div class="field">
              <div class="label">Print 8%</div>
              <div class="value">${esc(card.grade_print)}</div>
            </div>
            <div class="field">
              <div class="label">Rohwert</div>
              <div class="value">${esc(card.grade_total_raw || card.grade_total)}</div>
            </div>
          </div>

          ${images}
        `;
      } catch (err) {
        app.innerHTML = `<h1>Fehler beim Laden</h1><p>${esc(err.message)}</p>`;
      }
    }

    main();
  </script>
</body>
</html>
