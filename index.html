<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GRAID Zertifikatsdatenbank</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; color: #111; }
    .wrap { max-width: 880px; margin: 0 auto; padding: 48px 20px; }
    .card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    input { padding: 12px; width: 70%; max-width: 420px; font-size: 16px; }
    button { padding: 13px 18px; font-size: 16px; cursor: pointer; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>GRAID Zertifikatsdatenbank</h1>
      <p class="muted">Gib eine Zertifikats-ID ein, um eine Karte zu prüfen.</p>
      <input id="certId" placeholder="z. B. GRD-26-000001" />
      <button onclick="go()">Prüfen</button>
    </div>
  </main>

  <script>
    function go() {
      const id = document.getElementById("certId").value.trim();
      if (!id) return;
      window.location.href = "cert.html?id=" + encodeURIComponent(id);
    }
  </script>
</body>
</html>
